<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Paolo Admin - Feedback</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .feedback-card { transition: all 0.2s; }
        .feedback-card:hover { transform: translateY(-2px); }
    </style>
</head>
<body class="bg-gray-100 min-h-screen">
    <!-- Header -->
    <header class="bg-blue-600 text-white sticky top-0 z-10 shadow-lg">
        <div class="max-w-lg mx-auto px-4 py-3">
            <div class="flex items-center gap-2">
                <button onclick="window.location.href='calendar.html'" class="p-2 hover:bg-blue-700 rounded-lg transition">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
                </button>
                <h1 class="text-lg font-bold flex-1">Feedback</h1>
                <button onclick="loadFeedback()" class="p-2 hover:bg-blue-700 rounded-lg transition">🔄</button>
            </div>
        </div>
    </header>

    <main class="max-w-lg mx-auto px-4 py-4 pb-24">
        <!-- Filters -->
        <div class="bg-white rounded-xl shadow p-4 mb-4">
            <div class="flex gap-2 mb-3">
                <button onclick="filterType('all')" id="filter-all" class="flex-1 py-2 rounded-lg font-medium bg-blue-600 text-white">Tous</button>
                <button onclick="filterType('besoin')" id="filter-besoin" class="flex-1 py-2 rounded-lg font-medium bg-gray-200 text-gray-700">💡 Besoins</button>
                <button onclick="filterType('idee')" id="filter-idee" class="flex-1 py-2 rounded-lg font-medium bg-gray-200 text-gray-700">💡 Idées</button>
                <button onclick="filterType('bug')" id="filter-bug" class="flex-1 py-2 rounded-lg font-medium bg-gray-200 text-gray-700">🐛 Bugs</button>
            </div>
            
            <div class="flex gap-2">
                <select id="status-filter" onchange="loadFeedback()" class="flex-1 p-2 border rounded-lg">
                    <option value="">Tous les statuts</option>
                    <option value="new">🆕 Nouveau</option>
                    <option value="vu">👀 Vu</option>
                    <option value="en_cours">🔧 En cours</option>
                    <option value="fait">✅ Fait</option>
                </select>
            </div>
        </div>

        <!-- Stats -->
        <div id="stats" class="grid grid-cols-4 gap-2 mb-4">
            <!-- Generated by JS -->
        </div>

        <!-- Loading -->
        <div id="loading" class="text-center py-8">
            <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-blue-600 mx-auto"></div>
        </div>

        <!-- Empty -->
        <div id="empty" class="hidden text-center py-12">
            <div class="text-6xl mb-4">📭</div>
            <p class="text-gray-500">Aucun feedback</p>
        </div>

        <!-- Feedback List -->
        <div id="feedback-list" class="space-y-3">
            <!-- Generated by JS -->
        </div>
    </main>

    <!-- Toast -->
    <div id="toast" class="fixed bottom-4 left-1/2 transform -translate-x-1/2 bg-gray-800 text-white px-6 py-3 rounded-lg shadow-lg hidden z-30">
        <span id="toast-message">Message</span>
    </div>

    <script>
    const API_URL = 'http://paolowash.pythonanywhere.com/api';
    const TOKEN = localStorage.getItem('admin_token') || 'paolo-secret-2025';
    
    let currentFilter = 'all';
    let allFeedback = [];
    
    const STATUS_EMOJIS = {
        'new': '🆕',
        'vu': '👀',
        'en_cours': '🔧',
        'fait': '✅'
    };
    
    const STATUS_LABELS = {
        'new': 'Nouveau',
        'vu': 'Vu',
        'en_cours': 'En cours',
        'fait': 'Fait'
    };
    
    const TYPE_EMOJIS = {
        'besoin': '💡',
        'idee': '💡',
        'bug': '🐛'
    };
    
    const TYPE_LABELS = {
        'besoin': 'Besoin',
        'idee': 'Idée',
        'bug': 'Bug'
    };

    async function loadFeedback() {
        document.getElementById('loading').classList.remove('hidden');
        document.getElementById('feedback-list').innerHTML = '';
        document.getElementById('empty').classList.add('hidden');
        
        try {
            const statusFilter = document.getElementById('status-filter').value;
            let url = `${API_URL}/feedback?limit=50`;
            if (statusFilter) {
                url += `&status=${statusFilter}`;
            }
            
            const response = await fetch(url);
            const data = await response.json();
            
            allFeedback = data.feedback || [];
            
            document.getElementById('loading').classList.add('hidden');
            
            updateStats();
            renderFeedback();
            
        } catch (e) {
            console.error('Error loading feedback:', e);
            document.getElementById('loading').classList.add('hidden');
            showToast('❌ Erreur de chargement');
        }
    }

    function updateStats() {
        const stats = { total: allFeedback.length, new: 0, vu: 0, en_cours: 0, fait: 0 };
        
        allFeedback.forEach(fb => {
            if (stats[fb.status] !== undefined) {
                stats[fb.status]++;
            }
        });
        
        const container = document.getElementById('stats');
        container.innerHTML = `
            <div class="bg-white rounded-lg p-2 text-center shadow">
                <div class="text-lg font-bold">${stats.total}</div>
                <div class="text-xs text-gray-500">Total</div>
            </div>
            <div class="bg-red-50 rounded-lg p-2 text-center shadow">
                <div class="text-lg font-bold text-red-600">${stats.new}</div>
                <div class="text-xs text-red-500">Nouveau</div>
            </div>
            <div class="bg-yellow-50 rounded-lg p-2 text-center shadow">
                <div class="text-lg font-bold text-yellow-600">${stats.en_cours}</div>
                <div class="text-xs text-yellow-500">En cours</div>
            </div>
            <div class="bg-green-50 rounded-lg p-2 text-center shadow">
                <div class="text-lg font-bold text-green-600">${stats.fait}</div>
                <div class="text-xs text-green-500">Fait</div>
            </div>
        `;
    }

    function filterType(type) {
        currentFilter = type;
        
        // Update buttons
        ['all', 'besoin', 'idee', 'bug'].forEach(t => {
            const btn = document.getElementById(`filter-${t}`);
            if (t === type) {
                btn.className = 'flex-1 py-2 rounded-lg font-medium bg-blue-600 text-white';
            } else {
                btn.className = 'flex-1 py-2 rounded-lg font-medium bg-gray-200 text-gray-700';
            }
        });
        
        renderFeedback();
    }

    function renderFeedback() {
        const container = document.getElementById('feedback-list');
        
        let filtered = allFeedback;
        if (currentFilter !== 'all') {
            filtered = allFeedback.filter(fb => fb.type === currentFilter);
        }
        
        if (filtered.length === 0) {
            document.getElementById('empty').classList.remove('hidden');
            return;
        }
        
        document.getElementById('empty').classList.add('hidden');
        
        container.innerHTML = filtered.map(fb => {
            const typeEmoji = TYPE_EMOJIS[fb.type] || '📝';
            const statusEmoji = STATUS_EMOJIS[fb.status] || '🆕';
            const statusLabel = STATUS_LABELS[fb.status] || fb.status;
            
            const statusColors = {
                'new': 'bg-red-100 text-red-700',
                'vu': 'bg-gray-100 text-gray-700',
                'en_cours': 'bg-yellow-100 text-yellow-700',
                'fait': 'bg-green-100 text-green-700'
            };
            const statusClass = statusColors[fb.status] || 'bg-gray-100 text-gray-700';
            
            return `
                <div class="feedback-card bg-white rounded-xl shadow p-4">
                    <div class="flex items-start justify-between mb-2">
                        <div class="flex items-center gap-2">
                            <span class="text-lg">${typeEmoji}</span>
                            <span class="font-bold text-sm">${TYPE_LABELS[fb.type] || fb.type}</span>
                            <span class="px-2 py-0.5 rounded-full text-xs font-medium ${statusClass}">
                                ${statusEmoji} ${statusLabel}
                            </span>
                        </div>
                        <span class="text-xs text-gray-400 font-mono">${fb.id}</span>
                    </div>
                    
                    <p class="text-gray-700 mb-3">${fb.description}</p>
                    
                    <div class="flex items-center justify-between text-sm">
                        <div class="text-gray-500">
                            👤 ${fb.author_name || 'Anonyme'}
                            <span class="mx-2">•</span>
                            ${new Date(fb.created_at).toLocaleDateString('fr-FR')}
                        </div>
                        
                        <div class="flex gap-2">
                            <select onchange="updateStatus('${fb.id}', this.value)" 
                                    class="text-sm p-1 border rounded"
003e
                                <option value="new" ${fb.status === 'new' ? 'selected' : ''}>🆕 Nouveau</option>
                                <option value="vu" ${fb.status === 'vu' ? 'selected' : ''}>👀 Vu</option>
                                <option value="en_cours" ${fb.status === 'en_cours' ? 'selected' : ''}>🔧 En cours</option>
                                <option value="fait" ${fb.status === 'fait' ? 'selected' : ''}>✅ Fait</option>
                            </select>
                        </div>
                    </div>
                </div>
            `;
        }).join('');
    }

    async function updateStatus(feedbackId, newStatus) {
        // This would need backend support - for now just show toast
        showToast(`ℹ️ Pour changer le statut, utilisez le bot: /status ${feedbackId} ${newStatus}`);
    }

    function showToast(message) {
        const toast = document.getElementById('toast');
        document.getElementById('toast-message').textContent = message;
        toast.classList.remove('hidden');
        setTimeout(() => toast.classList.add('hidden'), 3000);
    }

    // Init
    loadFeedback();
    </script>
</body>
</html>
