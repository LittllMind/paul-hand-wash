<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Paolo Admin - Détail Journée</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; touch-action: manipulation; }
        .slot-btn:active { transform: scale(0.95); }
        .toggle-checkbox:checked {
            right: 0;
            border-color: #10B981;
        }
        .toggle-checkbox:checked + .toggle-label {
            background-color: #10B981;
        }
    </style>
</head>
<body class="bg-gray-100 min-h-screen">
    <!-- Header -->
    <header class="bg-blue-600 text-white sticky top-0 z-10 shadow-lg">
        <div class="max-w-lg mx-auto px-4 py-3">
            <div class="flex items-center gap-2 mb-2">
                <button onclick="history.back()" class="p-2 hover:bg-blue-700 rounded-lg transition">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
                </button>
                <h1 class="text-lg font-bold flex-1" id="date-title">Journée</h1>
                <button onclick="deleteWorkingDay()" id="delete-btn" class="p-2 bg-red-500 hover:bg-red-600 rounded-lg transition hidden">
                    🗑️
                </button>
            </div>
        </div>
    </header>

    <main class="max-w-lg mx-auto px-4 py-4 pb-24">
        <!-- Loading State -->
        <div id="loading" class="text-center py-8">
            <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-blue-600 mx-auto"></div>
            <p class="text-gray-500 mt-2">Chargement...</p>
        </div>

        <!-- No Working Day -->
        <div id="no-day" class="hidden text-center py-8">
            <div class="text-6xl mb-4">📅</div>
            <p class="text-gray-600 mb-4">Cette journée n'est pas encore configurée.</p>
            <button onclick="createDay()" class="bg-blue-600 text-white py-3 px-6 rounded-lg font-semibold">
                Configurer cette journée
            </button>
        </div>

        <!-- Working Day Form -->
        <div id="day-form" class="hidden">
            <!-- Availability Toggle -->
            <div class="bg-white rounded-xl shadow p-4 mb-4">
                <div class="flex items-center justify-between">
                    <div>
                        <h2 class="font-bold text-lg">Disponibilité</h2>
                        <p class="text-sm text-gray-500" id="availability-status">Journée ouverte</p>
                    </div>
                    <div class="relative inline-block w-12 mr-2 align-middle select-none">
                        <input type="checkbox" id="is-available" checked 
                               class="toggle-checkbox absolute block w-6 h-6 rounded-full bg-white border-4 appearance-none cursor-pointer transition-all duration-300 left-0 top-0"
                               onchange="toggleAvailability()">
                        <label for="is-available" class="toggle-label block overflow-hidden h-6 rounded-full bg-green-500 cursor-pointer"></label>
                    </div>
                </div>
            </div>

            <!-- Time Ranges -->
            <div class="bg-white rounded-xl shadow p-4 mb-4">
                <h2 class="font-bold text-lg mb-4">🌅 Plages horaires</h2>
                
                <div class="mb-4">
                    <h3 class="font-medium text-sm text-gray-600 mb-2">Matin</h3>
                    <div class="grid grid-cols-2 gap-3">
                        <div>
                            <label class="block text-xs text-gray-500 mb-1">Début</label>
                            <input type="time" id="morning-start" class="w-full p-3 border rounded-lg">
                        </div>
                        <div>
                            <label class="block text-xs text-gray-500 mb-1">Fin</label>
                            <input type="time" id="morning-end" class="w-full p-3 border rounded-lg">
                        </div>
                    </div>
                </div>

                <div>
                    <h3 class="font-medium text-sm text-gray-600 mb-2">Après-midi</h3>
                    <div class="grid grid-cols-2 gap-3">
                        <div>
                            <label class="block text-xs text-gray-500 mb-1">Début</label>
                            <input type="time" id="afternoon-start" class="w-full p-3 border rounded-lg">
                        </div>
                        <div>
                            <label class="block text-xs text-gray-500 mb-1">Fin</label>
                            <input type="time" id="afternoon-end" class="w-full p-3 border rounded-lg">
                        </div>
                    </div>
                </div>
            </div>

            <!-- Location -->
            <div class="bg-white rounded-xl shadow p-4 mb-4">
                <label class="block text-sm font-medium text-gray-700 mb-2">📍 Zone / Lieu</label>
                <input type="text" id="location" placeholder="Ex: Rozier centre, Largentière..." 
                       class="w-full p-3 border rounded-lg">
            </div>

            <!-- Notes -->
            <div class="bg-white rounded-xl shadow p-4 mb-4">
                <label class="block text-sm font-medium text-gray-700 mb-2">📝 Notes</label>
                <textarea id="notes" rows="2" placeholder="Infos complémentaires..." 
                          class="w-full p-3 border rounded-lg"></textarea>
            </div>

            <!-- Save Button -->
            <button onclick="saveDay()" class="w-full bg-blue-600 text-white py-4 rounded-xl font-semibold shadow-lg hover:bg-blue-700 transition mb-4">
                💾 Sauvegarder les modifications
            </button>

            <!-- Slots Section -->
            <div id="slots-section" class="hidden">
                <div class="flex items-center justify-between mb-3">
                    <h2 class="font-bold text-lg">⏰ Créneaux</h2>
                    <button onclick="regenerateSlots()" class="text-sm text-blue-600 font-medium">
                        🔄 Régénérer
                    </button>
                </div>

                <!-- Stats -->
                <div id="slots-stats" class="bg-blue-50 rounded-lg p-3 mb-3 text-sm text-blue-800">
                    </div>

                <!-- Slots Grid -->
                <div id="slots-grid" class="grid grid-cols-3 gap-2">
                    <!-- Generated by JS -->
                </div>
            </div>
        </div>
    </main>

    <!-- Toast Notification -->
    <div id="toast" class="fixed bottom-4 left-1/2 transform -translate-x-1/2 bg-gray-800 text-white px-6 py-3 rounded-lg shadow-lg hidden z-30">
        <span id="toast-message">Message</span>
    </div>

    <script>
    const API_URL = 'http://paolowash.pythonanywhere.com/api/admin';
    const TOKEN = localStorage.getItem('admin_token') || 'paolo-secret-2025';
    
    let currentDate = new URLSearchParams(window.location.search).get('date');
    let workingDayId = null;
    let slots = [];

    if (!currentDate) {
        currentDate = new Date().toISOString().split('T')[0];
    }

    // Format date for display
    function formatDate(dateStr) {
        const [year, month, day] = dateStr.split('-').map(Number);
        const date = new Date(year, month - 1, day);
        const options = { weekday: 'long', day: 'numeric', month: 'long' };
        return date.toLocaleDateString('fr-FR', options);
    }

    document.getElementById('date-title').textContent = formatDate(currentDate);

    async function loadDay() {
        try {
            // Try to find working day by date
            const response = await fetch(`${API_URL}/working-days?month=${currentDate.slice(0, 7)}`, {
                headers: { 'Authorization': `Bearer ${TOKEN}` }
            });
            
            const data = await response.json();
            const wd = (data.working_days || []).find(d => d.date === currentDate);
            
            document.getElementById('loading').classList.add('hidden');
            
            if (!wd) {
                document.getElementById('no-day').classList.remove('hidden');
                document.getElementById('day-form').classList.add('hidden');
                return;
            }
            
            workingDayId = wd.id;
            document.getElementById('no-day').classList.add('hidden');
            document.getElementById('day-form').classList.remove('hidden');
            document.getElementById('delete-btn').classList.remove('hidden');
            
            // Fill form
            document.getElementById('is-available').checked = wd.is_available;
            document.getElementById('morning-start').value = wd.morning_start || '';
            document.getElementById('morning-end').value = wd.morning_end || '';
            document.getElementById('afternoon-start').value = wd.afternoon_start || '';
            document.getElementById('afternoon-end').value = wd.afternoon_end || '';
            document.getElementById('location').value = wd.location || '';
            document.getElementById('notes').value = wd.notes || '';
            
            updateAvailabilityUI(wd.is_available);
            
            // Load slots
            await loadSlots();
            
        } catch (e) {
            console.error('Error loading day:', e);
            showToast('❌ Erreur de chargement');
            document.getElementById('loading').classList.add('hidden');
        }
    }

    async function loadSlots() {
        if (!workingDayId) return;
        
        try {
            const response = await fetch(`${API_URL}/slots?working_day_id=${workingDayId}`, {
                headers: { 'Authorization': `Bearer ${TOKEN}` }
            });
            
            const data = await response.json();
            slots = data.slots || [];
            
            renderSlots();
            
        } catch (e) {
            console.error('Error loading slots:', e);
        }
    }

    function renderSlots() {
        const section = document.getElementById('slots-section');
        const grid = document.getElementById('slots-grid');
        const stats = document.getElementById('slots-stats');
        
        if (slots.length === 0) {
            section.classList.add('hidden');
            return;
        }
        
        section.classList.remove('hidden');
        
        // Stats
        const available = slots.filter(s => s.is_available && !s.is_blocked).length;
        const blocked = slots.filter(s => s.is_blocked).length;
        const booked = slots.filter(s => s.booking_id).length;
        
        stats.innerHTML = `
            <div class="flex justify-between">
                <span><span class="w-2 h-2 inline-block rounded-full bg-green-400 mr-1"></span>${available} dispo</span>
                <span><span class="w-2 h-2 inline-block rounded-full bg-orange-400 mr-1"></span>${blocked} bloqué</span>
                <span><span class="w-2 h-2 inline-block rounded-full bg-blue-400 mr-1"></span>${booked} réservé</span>
            </div>
        `;
        
        // Grid
        grid.innerHTML = slots.map(slot => {
            let bgClass = 'bg-green-100 text-green-800 border-green-200';
            let status = 'Dispo';
            
            if (slot.is_blocked) {
                bgClass = 'bg-orange-100 text-orange-800 border-orange-200';
                status = 'Bloqué';
            } else if (slot.booking_id) {
                bgClass = 'bg-blue-100 text-blue-800 border-blue-200';
                status = 'Réservé';
            } else if (!slot.is_available) {
                bgClass = 'bg-gray-100 text-gray-500 border-gray-200';
                status = 'Fermé';
            }
            
            const canToggle = !slot.booking_id;
            
            return `
                <button onclick="${canToggle ? `toggleSlot(${slot.id})` : ''}" 
                        class="slot-btn p-2 rounded-lg border-2 ${bgClass} ${canToggle ? 'hover:shadow-md' : 'opacity-75 cursor-default'} transition text-center"
003e
                    <div class="font-bold text-sm">${slot.time}</div>
                    <div class="text-xs">${status}</div>
                </button>
            `;
        }).join('');
    }

    function updateAvailabilityUI(isAvailable) {
        const status = document.getElementById('availability-status');
        status.textContent = isAvailable ? 'Journée ouverte ✅' : 'Journée fermée ❌';
        status.className = isAvailable ? 'text-sm text-green-600' : 'text-sm text-red-600';
    }

    function toggleAvailability() {
        const isAvailable = document.getElementById('is-available').checked;
        updateAvailabilityUI(isAvailable);
    }

    async function createDay() {
        const data = {
            date: currentDate,
            is_available: true,
            morning_start: '08:00',
            morning_end: '12:00',
            afternoon_start: '14:00',
            afternoon_end: '18:00',
            generate_slots: true
        };
        
        try {
            const response = await fetch(`${API_URL}/working-days`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${TOKEN}`
                },
                body: JSON.stringify(data)
            });
            
            if (response.ok) {
                showToast('✅ Journée créée');
                loadDay();
            } else {
                const error = await response.json();
                showToast(`❌ ${error.error || 'Erreur'}`);
            }
        } catch (e) {
            showToast('❌ Erreur réseau');
        }
    }

    async function saveDay() {
        if (!workingDayId) return;
        
        const data = {
            is_available: document.getElementById('is-available').checked,
            morning_start: document.getElementById('morning-start').value || null,
            morning_end: document.getElementById('morning-end').value || null,
            afternoon_start: document.getElementById('afternoon-start').value || null,
            afternoon_end: document.getElementById('afternoon-end').value || null,
            location: document.getElementById('location').value || null,
            notes: document.getElementById('notes').value || null,
            regenerate_slots: false
        };
        
        try {
            const response = await fetch(`${API_URL}/working-days/${workingDayId}`, {
                method: 'PUT',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${TOKEN}`
                },
                body: JSON.stringify(data)
            });
            
            if (response.ok) {
                showToast('✅ Modifications sauvegardées');
            } else {
                const error = await response.json();
                showToast(`❌ ${error.error || 'Erreur'}`);
            }
        } catch (e) {
            showToast('❌ Erreur réseau');
        }
    }

    async function regenerateSlots() {
        if (!workingDayId) return;
        
        if (!confirm('Régénérer les créneaux ? Les créneaux non réservés seront remplacés.')) return;
        
        try {
            const response = await fetch(`${API_URL}/slots/generate`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${TOKEN}`
                },
                body: JSON.stringify({ working_day_id: workingDayId })
            });
            
            if (response.ok) {
                const result = await response.json();
                showToast(`✅ ${result.generated} créneaux générés`);
                loadSlots();
            } else {
                const error = await response.json();
                showToast(`❌ ${error.error || 'Erreur'}`);
            }
        } catch (e) {
            showToast('❌ Erreur réseau');
        }
    }

    async function toggleSlot(slotId) {
        const slot = slots.find(s => s.id === slotId);
        if (!slot) return;
        
        const newBlocked = !slot.is_blocked;
        
        try {
            const response = await fetch(`${API_URL}/slots/${slotId}`, {
                method: 'PUT',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${TOKEN}`
                },
                body: JSON.stringify({ is_blocked: newBlocked })
            });
            
            if (response.ok) {
                slot.is_blocked = newBlocked;
                renderSlots();
                showToast(newBlocked ? '🔒 Créneau bloqué' : '🔓 Créneau débloqué');
            }
        } catch (e) {
            showToast('❌ Erreur');
        }
    }

    async function deleteWorkingDay() {
        if (!workingDayId) return;
        
        if (!confirm('Supprimer cette journée et tous ses créneaux ?')) return;
        
        try {
            const response = await fetch(`${API_URL}/working-days/${workingDayId}`, {
                method: 'DELETE',
                headers: { 'Authorization': `Bearer ${TOKEN}` }
            });
            
            if (response.ok) {
                showToast('✅ Journée supprimée');
                setTimeout(() => history.back(), 1000);
            } else {
                const error = await response.json();
                showToast(`❌ ${error.error || 'Erreur'}`);
            }
        } catch (e) {
            showToast('❌ Erreur réseau');
        }
    }

    function showToast(message) {
        const toast = document.getElementById('toast');
        document.getElementById('toast-message').textContent = message;
        toast.classList.remove('hidden');
        setTimeout(() => toast.classList.add('hidden'), 3000);
    }

    // Init
    loadDay();
    </script>
</body>
</html>
