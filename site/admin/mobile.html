<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Paolo Admin - Vue Rapide</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; touch-action: manipulation; }
        .day-card { transition: all 0.2s; }
        .day-card:active { transform: scale(0.98); }
        .toggle-checkbox:checked + .toggle-label { background-color: #10B981; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen">
    <!-- Header -->
    <header class="bg-blue-600 text-white sticky top-0 z-10 shadow-lg">
        <div class="max-w-lg mx-auto px-4 py-3">
            <div class="flex items-center gap-2">
                <button onclick="window.location.href='calendar.html'" class="p-2 hover:bg-blue-700 rounded-lg transition">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
                </button>
                <h1 class="text-lg font-bold flex-1">Vue rapide (7 jours)</h1>
                <button onclick="loadDays()" class="p-2 hover:bg-blue-700 rounded-lg transition">
                    🔄
                </button>
            </div>
        </div>
    </header>

    <main class="max-w-lg mx-auto px-4 py-4 pb-24">
        <!-- Loading -->
        <div id="loading" class="text-center py-8">
            <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-blue-600 mx-auto"></div>
        </div>

        <!-- Days List -->
        <div id="days-list" class="space-y-3 hidden">
            <!-- Generated by JS -->
        </div>

        <!-- Empty State -->
        <div id="empty-state" class="hidden text-center py-12">
            <div class="text-6xl mb-4">📅</div>
            <p class="text-gray-500 mb-4">Aucune journée configurée pour les 7 prochains jours.</p>
            <a href="calendar.html" class="inline-block bg-blue-600 text-white py-3 px-6 rounded-lg font-semibold">
                Aller au calendrier
            </a>
        </div>

        <!-- Quick Add -->
        <div class="mt-6">
            <button onclick="quickAddToday()" class="w-full bg-green-500 text-white py-3 rounded-xl font-semibold shadow-lg hover:bg-green-600 transition">
                ➕ Ajouter aujourd'hui
            </button>
        </div>
    </main>

    <!-- Toast -->
    <div id="toast" class="fixed bottom-4 left-1/2 transform -translate-x-1/2 bg-gray-800 text-white px-6 py-3 rounded-lg shadow-lg hidden z-30">
        <span id="toast-message">Message</span>
    </div>

    <script>
    const API_URL = 'http://paolowash.pythonanywhere.com/api/admin';
    const TOKEN = localStorage.getItem('admin_token') || 'paolo-secret-2025';
    
    let workingDays = [];

    function getNext7Days() {
        const days = [];
        const today = new Date();
        for (let i = 0; i < 7; i++) {
            const d = new Date(today);
            d.setDate(today.getDate() + i);
            days.push(d.toISOString().split('T')[0]);
        }
        return days;
    }

    function formatDateShort(dateStr) {
        const [year, month, day] = dateStr.split('-').map(Number);
        const date = new Date(year, month - 1, day);
        const weekdays = ['Dim', 'Lun', 'Mar', 'Mer', 'Jeu', 'Ven', 'Sam'];
        return {
            weekday: weekdays[date.getDay()],
            day: day,
            month: date.toLocaleDateString('fr-FR', { month: 'short' })
        };
    }

    async function loadDays() {
        document.getElementById('loading').classList.remove('hidden');
        document.getElementById('days-list').classList.add('hidden');
        document.getElementById('empty-state').classList.add('hidden');
        
        const next7Days = getNext7Days();
        const month = next7Days[0].slice(0, 7);
        
        try {
            const response = await fetch(`${API_URL}/working-days?month=${month}`, {
                headers: { 'Authorization': `Bearer ${TOKEN}` }
            });
            
            const data = await response.json();
            const allDays = data.working_days || [];
            
            // Filter for next 7 days
            workingDays = allDays.filter(d => next7Days.includes(d.date));
            
            // Sort by date
            workingDays.sort((a, b) => a.date.localeCompare(b.date));
            
            document.getElementById('loading').classList.add('hidden');
            
            if (workingDays.length === 0) {
                document.getElementById('empty-state').classList.remove('hidden');
            } else {
                document.getElementById('days-list').classList.remove('hidden');
                renderDays();
            }
            
        } catch (e) {
            console.error('Error loading days:', e);
            document.getElementById('loading').classList.add('hidden');
            showToast('❌ Erreur de chargement');
        }
    }

    function renderDays() {
        const container = document.getElementById('days-list');
        
        container.innerHTML = workingDays.map(wd => {
            const date = formatDateShort(wd.date);
            const stats = wd.stats || {};
            const available = stats.available_slots || 0;
            const total = stats.total_slots || 0;
            
            let statusColor = 'bg-green-500';
            let statusText = 'Ouvert';
            
            if (!wd.is_available) {
                statusColor = 'bg-red-500';
                statusText = 'Fermé';
            } else if (total > 0 && available === 0) {
                statusColor = 'bg-orange-500';
                statusText = 'Complet';
            }
            
            const isToday = wd.date === new Date().toISOString().split('T')[0];
            const todayBadge = isToday ? '<span class="ml-2 text-xs bg-blue-100 text-blue-700 px-2 py-0.5 rounded-full">Aujourd'hui</span>' : '';
            
            return `
                <div onclick="openDay('${wd.date}')" class="day-card bg-white rounded-xl shadow p-4 cursor-pointer">
                    <div class="flex items-center gap-4">
                        <div class="text-center min-w-[60px]">
                            <div class="text-xs text-gray-500 uppercase">${date.weekday}</div>
                            <div class="text-2xl font-bold">${date.day}</div>
                            <div class="text-xs text-gray-400">${date.month}</div>
                        </div>
                        
                        <div class="flex-1">
                            <div class="flex items-center mb-1">
                                <span class="w-3 h-3 rounded-full ${statusColor} mr-2"></span>
                                <span class="font-medium">${statusText}</span>
                                ${todayBadge}
                            </div>
                            
                            ${wd.location ? `<div class="text-sm text-gray-600 mb-1">📍 ${wd.location}</div>` : ''}
                            
                            <div class="text-sm text-gray-500">
                                ${total > 0 ? `<span class="font-medium text-green-600">${available}/${total}</span> créneaux` : 'Pas de créneaux'}
                            </div>
                            
                            ${wd.morning_start ? `<div class="text-xs text-gray-400 mt-1">🕐 ${wd.morning_start}-${wd.morning_end} | ${wd.afternoon_start}-${wd.afternoon_end}</div>` : ''}
                        </div>
                        
                        <svg class="w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/>
                        </svg>
                    </div>
                </div>
            `;
        }).join('');
    }

    function openDay(dateStr) {
        window.location.href = `day.html?date=${dateStr}`;
    }

    async function quickAddToday() {
        const today = new Date().toISOString().split('T')[0];
        
        // Check if today already exists
        const exists = workingDays.find(d => d.date === today);
        if (exists) {
            openDay(today);
            return;
        }
        
        const data = {
            date: today,
            is_available: true,
            morning_start: '08:00',
            morning_end: '12:00',
            afternoon_start: '14:00',
            afternoon_end: '18:00',
            generate_slots: true
        };
        
        try {
            const response = await fetch(`${API_URL}/working-days`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${TOKEN}`
                },
                body: JSON.stringify(data)
            });
            
            if (response.ok) {
                showToast('✅ Journée créée');
                loadDays();
            } else {
                const error = await response.json();
                showToast(`❌ ${error.error || 'Erreur'}`);
            }
        } catch (e) {
            showToast('❌ Erreur réseau');
        }
    }

    function showToast(message) {
        const toast = document.getElementById('toast');
        document.getElementById('toast-message').textContent = message;
        toast.classList.remove('hidden');
        setTimeout(() => toast.classList.add('hidden'), 3000);
    }

    // Init
    loadDays();
    </script>
</body>
</html>
