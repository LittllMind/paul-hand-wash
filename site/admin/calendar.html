<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Paolo Admin - Calendrier</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; touch-action: manipulation; }
        .calendar-day { min-height: 60px; }
        .calendar-day:active { transform: scale(0.95); }
        .slot-badge { font-size: 10px; }
        @media (max-width: 640px) {
            .calendar-grid { gap: 2px; }
            .calendar-day { min-height: 50px; font-size: 12px; }
        }
    </style>
</head>
<body class="bg-gray-100 min-h-screen">
    <!-- Header -->
    <header class="bg-blue-600 text-white sticky top-0 z-10 shadow-lg">
        <div class="max-w-lg mx-auto px-4 py-3 flex items-center justify-between">
            <button onclick="prevMonth()" class="p-2 hover:bg-blue-700 rounded-lg transition">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
            </button>
            <h1 id="month-title" class="text-lg font-bold">Mars 2025</h1>
            <button onclick="nextMonth()" class="p-2 hover:bg-blue-700 rounded-lg transition">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg>
            </button>
        </div>
    </header>

    <!-- Quick Actions -->
    <div class="max-w-lg mx-auto px-4 py-3 flex gap-2">
        <a href="mobile.html" class="flex-1 bg-white text-blue-600 py-2 px-4 rounded-lg shadow text-center font-medium text-sm">
            📱 Vue rapide
        </a>
        <button onclick="showAddModal()" class="flex-1 bg-green-500 text-white py-2 px-4 rounded-lg shadow font-medium text-sm">
            ➕ Ajouter jour
        </button>
    </div>

    <!-- Calendar -->
    <main class="max-w-lg mx-auto px-2 pb-20">
        <!-- Weekday headers -->
        <div class="grid grid-cols-7 gap-1 mb-1 text-center">
            <div class="text-xs font-medium text-gray-500 py-1">Lun</div>
            <div class="text-xs font-medium text-gray-500 py-1">Mar</div>
            <div class="text-xs font-medium text-gray-500 py-1">Mer</div>
            <div class="text-xs font-medium text-gray-500 py-1">Jeu</div>
            <div class="text-xs font-medium text-gray-500 py-1">Ven</div>
            <div class="text-xs font-medium text-gray-500 py-1 text-red-500">Sam</div>
            <div class="text-xs font-medium text-gray-500 py-1 text-red-500">Dim</div>
        </div>
        
        <!-- Calendar grid -->
        <div id="calendar-grid" class="grid grid-cols-7 gap-1 calendar-grid">
            <!-- Generated by JS -->
        </div>

        <!-- Legend -->
        <div class="mt-4 flex flex-wrap gap-2 justify-center text-xs">
            <span class="flex items-center gap-1"><span class="w-3 h-3 rounded-full bg-green-400"></span> Disponible</span>
            <span class="flex items-center gap-1"><span class="w-3 h-3 rounded-full bg-orange-400"></span> Partiel</span>
            <span class="flex items-center gap-1"><span class="w-3 h-3 rounded-full bg-red-400"></span> Fermé</span>
            <span class="flex items-center gap-1"><span class="w-3 h-3 rounded-full bg-gray-300"></span> Passé</span>
        </div>
    </main>

    <!-- Add Day Modal -->
    <div id="add-modal" class="fixed inset-0 bg-black bg-opacity-50 hidden z-20 flex items-end sm:items-center justify-center">
        <div class="bg-white rounded-t-xl sm:rounded-xl w-full max-w-lg p-4 max-h-[90vh] overflow-y-auto">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-lg font-bold">Ajouter une journée</h2>
                <button onclick="hideAddModal()" class="p-2 hover:bg-gray-100 rounded-lg">✕</button>
            </div>
            
            <form id="add-day-form" onsubmit="submitAddDay(event)">
                <div class="mb-3">
                    <label class="block text-sm font-medium text-gray-700 mb-1">Date</label>
                    <input type="date" id="add-date" required class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-blue-500">
                </div>
                
                <div class="mb-3">
                    <label class="flex items-center gap-2">
                        <input type="checkbox" id="add-is-available" checked class="w-5 h-5 text-blue-600">
                        <span class="font-medium">Journée disponible</span>
                    </label>
                </div>

                <div class="grid grid-cols-2 gap-3 mb-3">
                    <div>
                        <label class="block text-xs font-medium text-gray-600 mb-1">Matin début</label>
                        <input type="time" id="add-morning-start" value="08:00" class="w-full p-2 border rounded-lg">
                    </div>
                    <div>
                        <label class="block text-xs font-medium text-gray-600 mb-1">Matin fin</label>
                        <input type="time" id="add-morning-end" value="12:00" class="w-full p-2 border rounded-lg">
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-3 mb-3">
                    <div>
                        <label class="block text-xs font-medium text-gray-600 mb-1">Après-midi début</label>
                        <input type="time" id="add-afternoon-start" value="14:00" class="w-full p-2 border rounded-lg">
                    </div>
                    <div>
                        <label class="block text-xs font-medium text-gray-600 mb-1">Après-midi fin</label>
                        <input type="time" id="add-afternoon-end" value="18:00" class="w-full p-2 border rounded-lg">
                    </div>
                </div>

                <div class="mb-3">
                    <label class="block text-sm font-medium text-gray-700 mb-1">Zone / Lieu</label>
                    <input type="text" id="add-location" placeholder="Ex: Rozier centre" class="w-full p-3 border rounded-lg">
                </div>

                <div class="mb-4">
                    <label class="block text-sm font-medium text-gray-700 mb-1">Notes</label>
                    <textarea id="add-notes" rows="2" placeholder="Infos complémentaires..." class="w-full p-3 border rounded-lg"></textarea>
                </div>

                <div class="mb-4">
                    <label class="flex items-center gap-2">
                        <input type="checkbox" id="add-generate-slots" checked class="w-5 h-5 text-blue-600">
                        <span class="text-sm">Générer automatiquement les créneaux (toutes les heures)</span>
                    </label>
                </div>

                <button type="submit" class="w-full bg-blue-600 text-white py-3 rounded-lg font-semibold hover:bg-blue-700 transition">
                    Créer la journée
                </button>
            </form>
        </div>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="fixed bottom-4 left-1/2 transform -translate-x-1/2 bg-gray-800 text-white px-6 py-3 rounded-lg shadow-lg hidden z-30">
        <span id="toast-message">Message</span>
    </div>

    <script>
    const API_URL = 'http://paolowash.pythonanywhere.com/api/admin';
    const TOKEN = localStorage.getItem('admin_token') || 'paolo-secret-2025';
    
    let currentYear = new Date().getFullYear();
    let currentMonth = new Date().getMonth();
    let workingDaysCache = {};

    // Format: YYYY-MM
    function getMonthKey(year, month) {
        return `${year}-${String(month + 1).padStart(2, '0')}`;
    }

    function updateMonthTitle() {
        const months = ['Janvier', 'Février', 'Mars', 'Avril', 'Mai', 'Juin', 
                       'Juillet', 'Août', 'Septembre', 'Octobre', 'Novembre', 'Décembre'];
        document.getElementById('month-title').textContent = `${months[currentMonth]} ${currentYear}`;
    }

    function prevMonth() {
        currentMonth--;
        if (currentMonth < 0) {
            currentMonth = 11;
            currentYear--;
        }
        loadCalendar();
    }

    function nextMonth() {
        currentMonth++;
        if (currentMonth > 11) {
            currentMonth = 0;
            currentYear++;
        }
        loadCalendar();
    }

    async function loadWorkingDays() {
        const monthKey = getMonthKey(currentYear, currentMonth);
        try {
            const response = await fetch(`${API_URL}/working-days?month=${monthKey}`, {
                headers: { 'Authorization': `Bearer ${TOKEN}` }
            });
            const data = await response.json();
            
            workingDaysCache = {};
            (data.working_days || []).forEach(wd => {
                workingDaysCache[wd.date] = wd;
            });
        } catch (e) {
            console.error('Error loading working days:', e);
        }
    }

    function getDayStatus(dateStr, wd) {
        const today = new Date().toISOString().split('T')[0];
        const isPast = dateStr < today;
        
        if (!wd) return { class: 'bg-gray-100 text-gray-400', label: '' };
        if (isPast) return { class: 'bg-gray-200 text-gray-500', label: '' };
        
        if (!wd.is_available) {
            return { class: 'bg-red-100 text-red-700', label: 'Fermé' };
        }
        
        const stats = wd.stats || {};
        const available = stats.available_slots || 0;
        const total = stats.total_slots || 0;
        
        if (total === 0) {
            return { class: 'bg-orange-100 text-orange-700', label: '∅' };
        }
        
        if (available === 0) {
            return { class: 'bg-orange-100 text-orange-700', label: 'Complet' };
        }
        
        if (available < total / 2) {
            return { class: 'bg-orange-100 text-orange-700', label: `${available}/${total}` };
        }
        
        return { class: 'bg-green-100 text-green-700', label: `${available}/${total}` };
    }

    async function loadCalendar() {
        await loadWorkingDays();
        updateMonthTitle();
        
        const grid = document.getElementById('calendar-grid');
        grid.innerHTML = '';
        
        const firstDay = new Date(currentYear, currentMonth, 1);
        const lastDay = new Date(currentYear, currentMonth + 1, 0);
        const daysInMonth = lastDay.getDate();
        const startDayOfWeek = firstDay.getDay() || 7; // 1 = Lundi
        
        // Empty cells before first day
        for (let i = 1; i < startDayOfWeek; i++) {
            grid.innerHTML += '<div></div>';
        }
        
        // Days
        const today = new Date().toISOString().split('T')[0];
        
        for (let day = 1; day <= daysInMonth; day++) {
            const dateStr = `${currentYear}-${String(currentMonth + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
            const wd = workingDaysCache[dateStr];
            const status = getDayStatus(dateStr, wd);
            const isToday = dateStr === today;
            
            const borderClass = isToday ? 'ring-2 ring-blue-500' : '';
            
            grid.innerHTML += `
                <div onclick="openDay('${dateStr}')" 
                     class="calendar-day ${status.class} ${borderClass} rounded-lg p-1 flex flex-col items-center justify-center cursor-pointer hover:shadow-md transition border border-gray-200">
                    <span class="font-semibold">${day}</span>
                    ${status.label ? `<span class="slot-badge mt-1 px-1 rounded ${wd && wd.is_available ? 'bg-white bg-opacity-50' : ''}">${status.label}</span>` : ''}
                </div>
            `;
        }
    }

    function openDay(dateStr) {
        window.location.href = `day.html?date=${dateStr}`;
    }

    function showAddModal() {
        document.getElementById('add-date').value = new Date().toISOString().split('T')[0];
        document.getElementById('add-modal').classList.remove('hidden');
    }

    function hideAddModal() {
        document.getElementById('add-modal').classList.add('hidden');
    }

    function showToast(message, type = 'success') {
        const toast = document.getElementById('toast');
        document.getElementById('toast-message').textContent = message;
        toast.classList.remove('hidden');
        setTimeout(() => toast.classList.add('hidden'), 3000);
    }

    async function submitAddDay(e) {
        e.preventDefault();
        
        const data = {
            date: document.getElementById('add-date').value,
            is_available: document.getElementById('add-is-available').checked,
            morning_start: document.getElementById('add-morning-start').value || null,
            morning_end: document.getElementById('add-morning-end').value || null,
            afternoon_start: document.getElementById('add-afternoon-start').value || null,
            afternoon_end: document.getElementById('add-afternoon-end').value || null,
            location: document.getElementById('add-location').value || null,
            notes: document.getElementById('add-notes').value || null,
            generate_slots: document.getElementById('add-generate-slots').checked
        };
        
        try {
            const response = await fetch(`${API_URL}/working-days`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${TOKEN}`
                },
                body: JSON.stringify(data)
            });
            
            if (response.ok) {
                const result = await response.json();
                showToast(`✅ Journée créée avec ${result.slots_generated} créneaux`);
                hideAddModal();
                loadCalendar();
            } else {
                const error = await response.json();
                showToast(`❌ ${error.error || 'Erreur'}`, 'error');
            }
        } catch (e) {
            showToast(`❌ Erreur réseau`, 'error');
        }
    }

    // Init
    loadCalendar();
    </script>
</body>
</html>
